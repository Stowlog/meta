# Copy this to .github/workflows/release.yml in a monorepo that publishes to npm
# Requires in repo root:
#   - release-please-config.json
#   - .release-please-manifest.json
# Requires: GitHub environment named 'npm' configured with npm OIDC (Trusted Publishers)

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    uses: stowlog/meta/.github/workflows/release-please-monorepo.yml@main
    secrets: inherit
    with:
      publish-npm: true
      package-manager: pnpm # or npm
      node-version: '20'
      build-command: 'pnpm build' # remove if no build step needed
